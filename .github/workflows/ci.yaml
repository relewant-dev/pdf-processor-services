name: Release & Tagging

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint Conventional Commits
        if: github.event_name == 'pull_request'
        uses: wagoid/commitlint-github-action@v5

      - name: Ensure initial tag v0.0.0
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git rev-parse "v0.0.0" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag v0.0.0
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} v0.0.0
          fi

      - name: Semantic Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: release
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/relewant-dev/smart-ide-services:latest
  deploy:
    runs-on: ubuntu-latest
    needs: build
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: read

    steps:
      - name: Install WireGuard and SSH tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard resolvconf openssh-client sshpass

      - name: Configure VPN
        run: |
          sudo mkdir -p /etc/wireguard
          echo "${{ secrets.WG_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0

      - name: Verify WireGuard status
        run: |
          sudo wg show

      - name: Test VPN connection
        run: |
          ping -c 3 192.168.100.206


      Password-based SSH is supported for this deployment, but SSH keys would be safer.
      - name: Deploy on Proxmox machine
        run: |
          sshpass -p "${{ secrets.RW_AI_DEV_SERVER }}" ssh -o StrictHostKeyChecking=no administrator@192.168.100.206 << 'EOF'
            cd /home/alessandro/Desktop/smart-ide/smart-ide-services

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u relewant-dev --password-stdin

            docker compose pull
            docker compose up -d --build
          EOF
